<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Planet Purrbit — Cat Food Collector</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --color-bg: #06070f;
    --color-panel: rgba(18, 20, 38, 0.72);
    --color-panel-border: rgba(140, 150, 255, 0.22);
    --color-text: #eef0ff;
    --color-text-dim: #9aa0c9;
    --color-red: #ff5d6c;
    --color-blue: #5db4ff;
    --color-gold: #ffcd4a;
    --shadow-panel: 0 10px 30px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    --radius-panel: 18px;
    --duration-normal: 300ms;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--color-bg);
    overflow: hidden;
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--color-text);
  }

  #app { position: relative; width: 100vw; height: 100vh; }

  canvas#scene { display: block; width: 100%; height: 100%; touch-action: none; }

  .hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    padding: max(clamp(14px, 2vw, 28px), env(safe-area-inset-top)) max(clamp(14px, 2vw, 28px), env(safe-area-inset-right))
      max(clamp(14px, 2vw, 28px), env(safe-area-inset-bottom)) max(clamp(14px, 2vw, 28px), env(safe-area-inset-left));
    display: flex;
    flex-direction: column;
  }

  .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .panel {
    background: var(--color-panel);
    border: 1px solid var(--color-panel-border);
    border-radius: var(--radius-panel);
    box-shadow: var(--shadow-panel);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
  }

  /* Top-left: legend + floating pickup text */
  .legend {
    padding: 14px 18px;
    min-width: 168px;
  }

  .legend h2 {
    margin: 0 0 10px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 15px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-text-dim);
  }

  .legend ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .legend li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 14px;
  }

  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    box-shadow: 0 0 8px currentColor;
    flex-shrink: 0;
  }

  .swatch.red { background: var(--color-red); color: var(--color-red); }
  .swatch.blue { background: var(--color-blue); color: var(--color-blue); }
  .swatch.gold { background: var(--color-gold); color: var(--color-gold); }

  .float-layer {
    position: relative;
    height: 0;
    margin-top: 4px;
  }

  .float-text {
    position: absolute;
    left: 4px;
    top: 0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 26px;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
    animation: floatUp 1100ms var(--ease-out-expo) forwards;
    will-change: transform, opacity;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    15% { transform: translateY(-6px) scale(1.15); opacity: 1; }
    100% { transform: translateY(-64px) scale(1); opacity: 0; }
  }

  /* Top-right: scoreboard */
  .scoreboard {
    padding: 14px 24px;
    text-align: right;
  }

  .scoreboard .label {
    font-family: 'Baloo 2', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-dim);
    margin: 0 0 2px;
  }

  .scoreboard .value {
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(32px, 4vw, 44px);
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, #ffe28a, #ff9ecb 55%, #8ab4ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    transition: transform var(--duration-normal) var(--ease-out-expo);
    display: inline-block;
  }

  .scoreboard .value.bump { transform: scale(1.18); }

  .scoreboard .cans {
    margin-top: 6px;
    font-size: 12px;
    color: var(--color-text-dim);
    font-weight: 700;
  }

  /* Bottom-center controls hint */
  .controls-hint {
    position: absolute;
    left: 50%;
    bottom: clamp(14px, 2.5vw, 30px);
    transform: translateX(-50%);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 700;
    color: var(--color-text-dim);
  }

  .keys {
    display: flex;
    gap: 4px;
  }

  kbd {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 3px 7px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: var(--color-text);
  }

  .title-badge {
    position: absolute;
    top: clamp(14px, 2vw, 28px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }

  .title-badge h1 {
    margin: 0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(16px, 2.2vw, 22px);
    letter-spacing: 0.02em;
    color: var(--color-text);
    text-shadow: 0 2px 14px rgba(90, 110, 255, 0.5);
  }

  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--color-bg);
    font-family: 'Baloo 2', sans-serif;
    font-size: 18px;
    color: var(--color-text-dim);
    z-index: 10;
    transition: opacity 400ms ease;
  }

  #loading.hidden { opacity: 0; pointer-events: none; }

  /* Touch joystick — shown only on touch-primary devices (phones/tablets) */
  .joystick-zone {
    display: none;
    position: absolute;
    left: max(24px, env(safe-area-inset-left));
    bottom: max(24px, env(safe-area-inset-bottom));
    width: 128px;
    height: 128px;
    border-radius: 50%;
    background: var(--color-panel);
    border: 1px solid var(--color-panel-border);
    box-shadow: var(--shadow-panel);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    touch-action: none;
    pointer-events: auto;
  }

  .joystick-knob {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 56px;
    height: 56px;
    margin: -28px 0 0 -28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffe28a, #ff9ecb 55%, #8ab4ff);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    transition: transform 60ms linear;
  }

  @media (hover: none) and (pointer: coarse) {
    .joystick-zone { display: block; }
    .controls-hint { display: none; }
  }

  @media (max-width: 640px) {
    .legend { min-width: 132px; padding: 10px 12px; }
    .scoreboard { padding: 10px 14px; }
    .controls-hint { display: none; }
  }

  /* Phone portrait widths: the legend + scoreboard panels alone fill the
     available width, so the centered title would overlap them. */
  @media (max-width: 460px) {
    .title-badge { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div id="loading">Loading planet…</div>

  <div class="hud">
    <div class="title-badge">
      <h1>🪐 Planet Purrbit</h1>
    </div>

    <div class="hud-row">
      <section class="panel legend" aria-label="Point values">
        <h2>Can Values</h2>
        <ul>
          <li><span class="swatch red"></span>Red — 5 pts</li>
          <li><span class="swatch blue"></span>Blue — 7 pts</li>
          <li><span class="swatch gold"></span>Gold — 10 pts</li>
        </ul>
        <div class="float-layer" id="floatLayer"></div>
      </section>

      <section class="panel scoreboard" aria-label="Score">
        <p class="label">Score</p>
        <span class="value" id="scoreValue">0</span>
        <p class="cans" id="cansCollected">0 cans collected</p>
      </section>
    </div>
  </div>

  <div class="panel controls-hint">
    <span>Move</span>
    <div class="keys">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
    </div>
    <span>or</span>
    <div class="keys">
      <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>
    </div>
  </div>

  <div class="joystick-zone" id="joystickZone" aria-label="Move" role="presentation">
    <div class="joystick-knob" id="joystickKnob"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ---------------------------------------------------------------------- */
/* Constants                                                              */
/* ---------------------------------------------------------------------- */

const PLANET_RADIUS = 6;
const CAT_HOVER = 0.03;
const CAT_COLLISION_RADIUS = 1.05;
const CAN_COUNT = 6;
const CAN_HOVER = 0.5;
const MOVE_ANGULAR_SPEED = 0.62;   // radians of arc per second
const TURN_SPEED = 2.3;            // radians per second
const CAM_DISTANCE = 11.5;
const CAM_HEIGHT = 5.5;
const CAM_LERP = 4.5;

const CAN_TYPES = [
  { name: 'red', color: 0xff5d6c, points: 5 },
  { name: 'blue', color: 0x5db4ff, points: 7 },
  { name: 'gold', color: 0xffcd4a, points: 10 },
];

/* ---------------------------------------------------------------------- */
/* Renderer / Scene / Camera                                              */
/* ---------------------------------------------------------------------- */

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

function buildSkyTexture() {
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 2;
  skyCanvas.height = 256;
  const ctx = skyCanvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 256);
  gradient.addColorStop(0, '#2f96f2');
  gradient.addColorStop(0.55, '#8fd4ff');
  gradient.addColorStop(1, '#eaf7ff');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 2, 256);
  const texture = new THREE.CanvasTexture(skyCanvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

const scene = new THREE.Scene();
scene.background = buildSkyTexture();
scene.fog = new THREE.FogExp2(0xcfeaff, 0.006);

const camera = new THREE.PerspectiveCamera(
  55,
  window.innerWidth / window.innerHeight,
  0.1,
  500
);
camera.position.set(0, 10, 20);

/* ---------------------------------------------------------------------- */
/* Lighting                                                               */
/* ---------------------------------------------------------------------- */

const ambient = new THREE.AmbientLight(0xdbeeff, 0.75);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff6e0, 2.4);
sun.position.set(22, 32, 16);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 5;
sun.shadow.camera.far = 60;
sun.shadow.camera.left = -16;
sun.shadow.camera.right = 16;
sun.shadow.camera.top = 16;
sun.shadow.camera.bottom = -16;
sun.shadow.bias = -0.0015;
scene.add(sun);

const skyFill = new THREE.HemisphereLight(0xbfe3ff, 0x8a6a45, 0.6);
scene.add(skyFill);

/* ---------------------------------------------------------------------- */
/* Planet                                                                 */
/* ---------------------------------------------------------------------- */

function buildPlanet() {
  const group = new THREE.Group();

  const geometry = new THREE.IcosahedronGeometry(PLANET_RADIUS, 5);
  const positionAttr = geometry.attributes.position;
  const colorAttr = new Float32Array(positionAttr.count * 3);
  const grass = new THREE.Color(0x5ec25f);
  const dirt = new THREE.Color(0x8a5a35);
  const v = new THREE.Vector3();
  for (let i = 0; i < positionAttr.count; i++) {
    v.fromBufferAttribute(positionAttr, i);
    const n = v.clone().normalize();
    const bump = (Math.sin(n.x * 6) + Math.sin(n.y * 7.3) + Math.sin(n.z * 5.1)) * 0.015;
    v.addScaledVector(n, bump);
    positionAttr.setXYZ(i, v.x, v.y, v.z);

    const patch =
      Math.sin(n.x * 3.1 + 1.7) * Math.sin(n.y * 2.3 - 0.6) * Math.sin(n.z * 2.9 + 3.1) +
      Math.sin(n.x * 6.7 - 2.1) * Math.sin(n.y * 5.3 + 1.1) * Math.sin(n.z * 6.1 - 0.4) * 0.5;
    const patchMix = THREE.MathUtils.smoothstep(patch, 0.18, 0.42);
    const shade = 0.88 + Math.random() * 0.24;
    const col = grass.clone().lerp(dirt, patchMix).multiplyScalar(shade);
    colorAttr[i * 3] = col.r;
    colorAttr[i * 3 + 1] = col.g;
    colorAttr[i * 3 + 2] = col.b;
  }
  geometry.computeVertexNormals();
  geometry.setAttribute('color', new THREE.BufferAttribute(colorAttr, 3));

  const material = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    vertexColors: true,
    roughness: 0.88,
    metalness: 0.02,
  });
  const surface = new THREE.Mesh(geometry, material);
  surface.receiveShadow = true;
  surface.castShadow = false;
  group.add(surface);

  const glowGeo = new THREE.SphereGeometry(PLANET_RADIUS * 1.035, 48, 48);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xeaf7ff,
    transparent: true,
    opacity: 0.05,
    side: THREE.BackSide,
  });
  group.add(new THREE.Mesh(glowGeo, glowMat));

  // Decorative props scattered on the surface (non-interactive)
  const propGroup = new THREE.Group();
  const propMat = new THREE.MeshStandardMaterial({ color: 0x3f9a54, roughness: 0.85 });
  for (let i = 0; i < 40; i++) {
    const dir = randomPointOnSphere();
    const scale = 0.18 + Math.random() * 0.28;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(scale, scale * 2.2, 6), propMat);
    cone.position.copy(dir).multiplyScalar(PLANET_RADIUS + scale * 0.9);
    orientToNormal(cone, dir);
    cone.castShadow = true;
    cone.receiveShadow = true;
    propGroup.add(cone);
  }
  group.add(propGroup);

  scene.add(group);
  return group;
}

function orientToNormal(object3d, normal) {
  const up = new THREE.Vector3(0, 1, 0);
  object3d.quaternion.setFromUnitVectors(up, normal.clone().normalize());
}

function randomPointOnSphere() {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  return new THREE.Vector3(
    Math.sin(phi) * Math.cos(theta),
    Math.cos(phi),
    Math.sin(phi) * Math.sin(theta)
  );
}

buildPlanet();

/* ---------------------------------------------------------------------- */
/* Cat character                                                          */
/* ---------------------------------------------------------------------- */

function buildCat() {
  const cat = new THREE.Group();

  const furMat = new THREE.MeshStandardMaterial({ color: 0x201d22, roughness: 0.55 });
  const furDarkMat = new THREE.MeshStandardMaterial({ color: 0x121014, roughness: 0.6 });
  const pinkMat = new THREE.MeshStandardMaterial({ color: 0x7a4a55, roughness: 0.5 });
  const eyeMat = new THREE.MeshStandardMaterial({
    color: 0xcdfa4c,
    emissive: 0x8fdc2a,
    emissiveIntensity: 0.5,
    roughness: 0.25,
  });
  const pupilMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.3 });
  const whiskerMat = new THREE.LineBasicMaterial({ color: 0xe8e2d8, transparent: true, opacity: 0.85 });

  const bodyPivot = new THREE.Group();
  bodyPivot.name = 'bodyPivot';
  cat.add(bodyPivot);

  // Slim, lean torso — noticeably narrower radius than a typical stocky build.
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.22, 0.66, 4, 10), furMat);
  body.rotation.z = Math.PI / 2;
  body.position.set(0, 0.24, 0);
  body.castShadow = true;
  body.receiveShadow = true;
  bodyPivot.add(body);

  // Head and face are built at the original (larger) scale, then grouped and
  // uniformly scaled down + repositioned to match the slimmer torso — this
  // keeps every facial feature's relative proportions intact.
  const headGroup = new THREE.Group();
  headGroup.position.set(0.02, -0.04, 0);
  headGroup.scale.setScalar(0.78);
  bodyPivot.add(headGroup);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.34, 16, 16), furMat);
  head.position.set(0.62, 0.62, 0);
  head.castShadow = true;
  headGroup.add(head);

  const muzzle = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 12), furDarkMat);
  muzzle.position.set(0.85, 0.53, 0);
  muzzle.scale.set(1, 0.7, 0.85);
  headGroup.add(muzzle);

  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), pinkMat);
  nose.position.set(0.98, 0.56, 0);
  headGroup.add(nose);

  // Large, sharply pointed ears — the defining silhouette trait of the reference cat.
  const earGeo = new THREE.ConeGeometry(0.16, 0.36, 6);
  const earL = new THREE.Mesh(earGeo, furMat);
  earL.position.set(0.52, 0.95, 0.15);
  earL.rotation.x = -0.22;
  earL.rotation.z = -0.12;
  headGroup.add(earL);
  const earR = earL.clone();
  earR.position.z = -0.15;
  earR.rotation.x = 0.22;
  headGroup.add(earR);

  // Bright, glowing yellow-green eyes with dark slit pupils.
  const eyeGeo = new THREE.SphereGeometry(0.06, 10, 10);
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(0.83, 0.67, 0.13);
  eyeL.scale.set(1, 1.2, 0.6);
  headGroup.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.z = -0.13;
  headGroup.add(eyeR);

  const pupilGeo = new THREE.SphereGeometry(0.022, 8, 8);
  const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
  pupilL.position.set(0.878, 0.67, 0.13);
  headGroup.add(pupilL);
  const pupilR = pupilL.clone();
  pupilR.position.z = -0.13;
  headGroup.add(pupilR);

  // Whiskers — thin lines sweeping back from the muzzle, echoing the sketchy reference art.
  const whiskerSide = [1, -1];
  for (const side of whiskerSide) {
    for (let w = 0; w < 3; w++) {
      const startY = 0.53 + w * 0.03;
      const points = [
        new THREE.Vector3(0.92, startY, side * 0.12),
        new THREE.Vector3(1.28, startY + 0.02 - w * 0.02, side * (0.32 + w * 0.05)),
      ];
      const whiskerGeo = new THREE.BufferGeometry().setFromPoints(points);
      const whisker = new THREE.Line(whiskerGeo, whiskerMat);
      headGroup.add(whisker);
    }
  }

  // Slender legs, drawn in a touch from the wider original stance.
  const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.4, 8);
  const legPositions = [
    [0.3, 0.2, 0.12], [0.3, 0.2, -0.12],
    [-0.3, 0.2, 0.12], [-0.3, 0.2, -0.12],
  ];
  const legs = legPositions.map((p) => {
    const leg = new THREE.Mesh(legGeo, furDarkMat);
    leg.position.set(...p);
    leg.castShadow = true;
    bodyPivot.add(leg);
    return leg;
  });

  // Crooked, kinked tail — a chain of tapering segments, each bent at a fixed
  // joint angle in three axes, rather than one straight cylinder.
  const tailPivot = new THREE.Group();
  tailPivot.position.set(-0.34, 0.34, 0);
  tailPivot.rotation.z = 0.6;
  bodyPivot.add(tailPivot);

  const tailSegments = [
    { length: 0.3, radiusTop: 0.055, radiusBottom: 0.065, bendX: 0.5, bendY: 0.35, bendZ: 0.3 },
    { length: 0.26, radiusTop: 0.035, radiusBottom: 0.055, bendX: -0.7, bendY: -0.5, bendZ: -0.4 },
    { length: 0.2, radiusTop: 0.018, radiusBottom: 0.035, bendX: 0.65, bendY: 0.55, bendZ: 0.45 },
  ];
  let tailJoint = tailPivot;
  for (const seg of tailSegments) {
    const segMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(seg.radiusTop, seg.radiusBottom, seg.length, 8),
      furMat
    );
    segMesh.rotation.z = Math.PI / 2;
    segMesh.position.x = -seg.length / 2;
    segMesh.castShadow = true;
    tailJoint.add(segMesh);

    const nextJoint = new THREE.Group();
    nextJoint.position.x = -seg.length;
    nextJoint.rotation.x = seg.bendX;
    nextJoint.rotation.y = seg.bendY;
    nextJoint.rotation.z = seg.bendZ;
    tailJoint.add(nextJoint);
    tailJoint = nextJoint;
  }

  // The body was modeled with the head along local +X, but Object3D.lookAt()
  // (used every frame to face the cat along its travel direction) aligns the
  // local -Z axis to the target. Rotate the anatomy 90 degrees so +X becomes
  // -Z, making the head point the way lookAt expects "forward" to be.
  bodyPivot.rotation.y = -Math.PI / 2;

  cat.userData.legs = legs;
  cat.userData.tailPivot = tailPivot;
  cat.userData.bodyPivot = bodyPivot;

  scene.add(cat);
  return cat;
}

const cat = buildCat();

/* ---------------------------------------------------------------------- */
/* Player state — locked to the sphere surface                           */
/* ---------------------------------------------------------------------- */

const player = {
  position: new THREE.Vector3(0, PLANET_RADIUS, 0),
  forward: new THREE.Vector3(1, 0, 0),
  up: new THREE.Vector3(0, 1, 0),
};

function normalizeTangent(vec, up) {
  vec.addScaledVector(up, -vec.dot(up));
  if (vec.lengthSq() < 1e-8) {
    vec.set(1, 0, 0).addScaledVector(up, -up.x).normalize();
  } else {
    vec.normalize();
  }
  return vec;
}

function movePlayer(forwardAmount, turnAmount, dt) {
  player.up.copy(player.position).normalize();
  normalizeTangent(player.forward, player.up);

  if (turnAmount !== 0) {
    const turnQuat = new THREE.Quaternion().setFromAxisAngle(player.up, turnAmount * TURN_SPEED * dt);
    player.forward.applyQuaternion(turnQuat);
  }

  if (forwardAmount !== 0) {
    const right = new THREE.Vector3().crossVectors(player.forward, player.up).normalize();
    const angle = -forwardAmount * MOVE_ANGULAR_SPEED * dt;
    const moveQuat = new THREE.Quaternion().setFromAxisAngle(right, angle);
    player.position.applyQuaternion(moveQuat);
    player.forward.applyQuaternion(moveQuat);
  }

  player.position.setLength(PLANET_RADIUS);
  player.up.copy(player.position).normalize();
  normalizeTangent(player.forward, player.up);
}

/* ---------------------------------------------------------------------- */
/* Input                                                                  */
/* ---------------------------------------------------------------------- */

const keys = new Set();
window.addEventListener('keydown', (e) => keys.add(e.code));
window.addEventListener('keyup', (e) => keys.delete(e.code));

// Touch joystick — bottom-left drag pad, shown only on touch-primary devices via CSS.
const touchInput = { forward: 0, turn: 0 };

function setupJoystick() {
  const zone = document.getElementById('joystickZone');
  const knob = document.getElementById('joystickKnob');
  const maxRadius = 40;
  let activePointerId = null;
  let originX = 0;
  let originY = 0;

  function updateFromPointer(clientX, clientY) {
    const dx = clientX - originX;
    const dy = clientY - originY;
    const dist = Math.min(Math.hypot(dx, dy), maxRadius);
    const angle = Math.atan2(dy, dx);
    const knobX = Math.cos(angle) * dist;
    const knobY = Math.sin(angle) * dist;
    knob.style.transform = `translate(${knobX}px, ${knobY}px)`;
    touchInput.forward = -knobY / maxRadius;
    touchInput.turn = -knobX / maxRadius;
  }

  function reset() {
    knob.style.transform = 'translate(0, 0)';
    touchInput.forward = 0;
    touchInput.turn = 0;
  }

  zone.addEventListener('pointerdown', (e) => {
    if (activePointerId !== null) return;
    activePointerId = e.pointerId;
    const rect = zone.getBoundingClientRect();
    originX = rect.left + rect.width / 2;
    originY = rect.top + rect.height / 2;
    zone.setPointerCapture(activePointerId);
    updateFromPointer(e.clientX, e.clientY);
  });

  zone.addEventListener('pointermove', (e) => {
    if (e.pointerId !== activePointerId) return;
    updateFromPointer(e.clientX, e.clientY);
  });

  function endTouch(e) {
    if (e.pointerId !== activePointerId) return;
    activePointerId = null;
    reset();
  }

  zone.addEventListener('pointerup', endTouch);
  zone.addEventListener('pointercancel', endTouch);
}
setupJoystick();

function readInput() {
  let forward = touchInput.forward;
  let turn = touchInput.turn;
  if (keys.has('KeyW') || keys.has('ArrowUp')) forward += 1;
  if (keys.has('KeyS') || keys.has('ArrowDown')) forward -= 1;
  if (keys.has('KeyA') || keys.has('ArrowLeft')) turn += 1;
  if (keys.has('KeyD') || keys.has('ArrowRight')) turn -= 1;
  return {
    forward: Math.max(-1, Math.min(1, forward)),
    turn: Math.max(-1, Math.min(1, turn)),
  };
}

/* ---------------------------------------------------------------------- */
/* Cans (collectibles)                                                    */
/* ---------------------------------------------------------------------- */

const cans = [];

function makeCanMesh(type) {
  const group = new THREE.Group();

  const bodyMat = new THREE.MeshStandardMaterial({
    color: type.color,
    metalness: 0.65,
    roughness: 0.32,
  });
  const rimMat = new THREE.MeshStandardMaterial({
    color: 0xd8d8d8,
    metalness: 0.9,
    roughness: 0.25,
  });

  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.42, 20), bodyMat);
  body.position.y = 0.21;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  const lid = new THREE.Mesh(new THREE.CylinderGeometry(0.33, 0.33, 0.04, 20), rimMat);
  lid.position.y = 0.44;
  lid.castShadow = true;
  group.add(lid);

  const label = new THREE.Mesh(
    new THREE.CylinderGeometry(0.325, 0.325, 0.2, 20, 1, true),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, side: THREE.DoubleSide })
  );
  label.position.y = 0.24;
  group.add(label);

  return group;
}

function spawnCan() {
  let position;
  let attempts = 0;
  do {
    position = randomPointOnSphere().multiplyScalar(PLANET_RADIUS);
    attempts++;
  } while (
    attempts < 30 &&
    (position.distanceTo(player.position) < 2.4 ||
      cans.some((c) => c.position.distanceTo(position) < 1.8))
  );

  const type = CAN_TYPES[Math.floor(Math.random() * CAN_TYPES.length)];
  const mesh = makeCanMesh(type);
  const normal = position.clone().normalize();
  mesh.position.copy(position);
  orientToNormal(mesh, normal);
  scene.add(mesh);

  const can = {
    mesh,
    type,
    position: position.clone(),
    spawnTime: performance.now(),
  };
  cans.push(can);
  return can;
}

function removeCan(can) {
  scene.remove(can.mesh);
  can.mesh.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
  });
  const idx = cans.indexOf(can);
  if (idx !== -1) cans.splice(idx, 1);
}

for (let i = 0; i < CAN_COUNT; i++) spawnCan();

/* ---------------------------------------------------------------------- */
/* Score + floating text UI                                               */
/* ---------------------------------------------------------------------- */

let score = 0;
let collectedCount = 0;
const scoreValueEl = document.getElementById('scoreValue');
const cansCollectedEl = document.getElementById('cansCollected');
const floatLayer = document.getElementById('floatLayer');

const CAN_COLOR_HEX = { red: '#ff5d6c', blue: '#5db4ff', gold: '#ffcd4a' };

function addScore(points, canType) {
  score += points;
  collectedCount += 1;
  scoreValueEl.textContent = String(score);
  scoreValueEl.classList.remove('bump');
  void scoreValueEl.offsetWidth;
  scoreValueEl.classList.add('bump');
  cansCollectedEl.textContent = `${collectedCount} can${collectedCount === 1 ? '' : 's'} collected`;

  const el = document.createElement('span');
  el.className = 'float-text';
  el.textContent = `+${points}`;
  el.style.color = CAN_COLOR_HEX[canType];
  el.style.left = `${4 + Math.random() * 40}px`;
  floatLayer.appendChild(el);
  window.setTimeout(() => el.remove(), 1150);
}

/* ---------------------------------------------------------------------- */
/* Camera follow                                                          */
/* ---------------------------------------------------------------------- */

function updateCamera(dt) {
  const desiredPos = player.position.clone()
    .addScaledVector(player.up, CAM_HEIGHT)
    .addScaledVector(player.forward, -CAM_DISTANCE);

  const lerpFactor = 1 - Math.exp(-CAM_LERP * dt);
  camera.position.lerp(desiredPos, lerpFactor);
  camera.up.copy(player.up);

  const lookTarget = player.position.clone().addScaledVector(player.up, 1.1);
  camera.lookAt(lookTarget);
}

/* ---------------------------------------------------------------------- */
/* Main loop                                                              */
/* ---------------------------------------------------------------------- */

const clock = new THREE.Clock();
let idleTime = 0;

function updateCat(dt, isMoving) {
  const surfacePos = player.position.clone().addScaledVector(player.up, CAT_HOVER);
  cat.position.copy(surfacePos);
  cat.up.copy(player.up);
  const lookTarget = surfacePos.clone().add(player.forward);
  cat.lookAt(lookTarget);

  idleTime += dt;
  const gaitSpeed = isMoving ? 10 : 2.4;
  const gaitAmp = isMoving ? 0.07 : 0.015;
  cat.userData.bodyPivot.position.y = Math.sin(idleTime * gaitSpeed) * gaitAmp;

  cat.userData.legs.forEach((leg, i) => {
    const phase = i % 2 === 0 ? 0 : Math.PI;
    leg.rotation.x = isMoving ? Math.sin(idleTime * gaitSpeed + phase) * 0.5 : 0;
  });

  cat.userData.tailPivot.rotation.y = Math.sin(idleTime * 3.2) * 0.4;
}

function checkCollisions() {
  for (const can of [...cans]) {
    if (player.position.distanceTo(can.position) < CAT_COLLISION_RADIUS) {
      addScore(can.type.points, can.type.name);
      removeCan(can);
      spawnCan();
    }
  }
}

function animateCans(elapsed) {
  for (const can of cans) {
    can.mesh.rotation.y = elapsed * 0.8;
    const bob = Math.max(0, Math.sin(elapsed * 2.4 + can.spawnTime * 0.001)) * 0.06;
    const normal = can.position.clone().normalize();
    can.mesh.position.copy(can.position).addScaledVector(normal, bob);
  }
}

function resize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

function tick() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.elapsedTime;
  const input = readInput();

  movePlayer(input.forward, input.turn, dt);
  updateCat(dt, input.forward !== 0);
  updateCamera(dt);
  checkCollisions();
  animateCans(elapsed);

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

const loadingEl = document.getElementById('loading');
requestAnimationFrame(() => {
  loadingEl.classList.add('hidden');
  window.setTimeout(() => loadingEl.remove(), 450);
});

tick();
</script>
</body>
